name: Bug report
description: Report a reproducible TUI, judge, installer, or state problem.
title: "[bug] "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Practicode version and install method
      placeholder: 0.2.0, npm prebuilt
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: OS, architecture, terminal, and terminal size
      placeholder: macOS arm64, WezTerm, 100x30
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: "1. Run ...\n2. Choose ...\n3. Press ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and sanitized output
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Safety check
      options:
        - label: I removed tokens, private prompts, local paths, and personal submission contents.
          required: true
        - label: I checked for an existing issue describing the same behavior.
          required: true
