name: Lesson correction
description: Report an inaccurate, unclear, or unnatural lesson without posting an answer.
title: "[lesson] "
labels: ["documentation"]
body:
  - type: dropdown
    id: programming-language
    attributes:
      label: Programming language
      options: [Python, TypeScript, Java, Rust]
    validations:
      required: true
  - type: dropdown
    id: ui-language
    attributes:
      label: UI language
      options: [English, Korean, Japanese, Simplified Chinese, Spanish]
    validations:
      required: true
  - type: input
    id: lesson-id
    attributes:
      label: Lesson ID
      placeholder: rust-ownership
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is inaccurate or unclear?
      description: Quote only the shortest relevant phrase. Do not include a complete exercise answer.
    validations:
      required: true
  - type: textarea
    id: correction
    attributes:
      label: Suggested correction or source
      description: A version-specific official reference is especially useful.
  - type: checkboxes
    id: privacy
    attributes:
      label: Safety check
      options:
        - label: I removed tokens, private paths, prompts, and submitted answer code.
          required: true
