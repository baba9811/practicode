name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Verify tag commit is on main
        shell: bash
        run: |
          set -euo pipefail
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main || {
            echo "tag commit is not reachable from origin/main" >&2
            exit 1
          }
      - name: Lint workflows
        run: >-
          go run github.com/rhysd/actionlint/cmd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca
          .github/workflows/ci.yml .github/workflows/release.yml
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - run: npm install --global typescript@5.9.3
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: 21
      - run: rustup toolchain install stable --profile minimal --component clippy --component rustfmt
      - run: rustup default stable
      - name: Check tag and package versions
        shell: bash
        run: |
          set -euo pipefail
          [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "release tag must be vMAJOR.MINOR.PATCH" >&2
            exit 1
          }
          version="${GITHUB_REF_NAME#v}"
          cargo_version=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          lock_version=$(sed -n '/name = "practicode"/{n;s/version = "\(.*\)"/\1/p;q;}' Cargo.lock)
          npm_version=$(node -p "require('./package.json').version")
          test "$version" = "$cargo_version"
          test "$version" = "$lock_version"
          test "$version" = "$npm_version"
      - run: make test
      - run: cargo install cargo-audit --locked
      - run: cargo audit --deny warnings
      - name: Build and smoke Docker sandbox
        shell: bash
        run: |
          set -euo pipefail
          image="practicode-sandbox:${GITHUB_REF_NAME#v}"
          docker build -t "$image" .
          docker run --rm --entrypoint sh "$image" -lc \
            'python3 --version && node --version && tsc --version && javac -version && rustc --version'
          docker run --rm -e PRACTICODE_HOME=/tmp/practicode-smoke "$image" --smoke

  build:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            asset: practicode-x86_64-apple-darwin
          - runner: macos-15
            target: aarch64-apple-darwin
            asset: practicode-aarch64-apple-darwin
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            asset: practicode-x86_64-unknown-linux-musl
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            asset: practicode-aarch64-unknown-linux-musl
          - runner: windows-2025
            target: x86_64-pc-windows-msvc
            asset: practicode-x86_64-pc-windows-msvc.exe
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install musl tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Install Rust target
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal --target "${{ matrix.target }}"
          rustup default stable
      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package and smoke Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist "$RUNNER_TEMP/practicode-home"
          cp "target/${{ matrix.target }}/release/practicode" "dist/${{ matrix.asset }}"
          chmod 0755 "dist/${{ matrix.asset }}"
          PRACTICODE_HOME="$RUNNER_TEMP/practicode-home" \
            PRACTICODE_NO_UPDATE_CHECK=1 \
            "dist/${{ matrix.asset }}" --smoke
      - name: Package and smoke Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          New-Item -ItemType Directory -Force "$env:RUNNER_TEMP\practicode-home" | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\practicode.exe" "dist\${{ matrix.asset }}"
          $env:PRACTICODE_HOME = "$env:RUNNER_TEMP\practicode-home"
          $env:PRACTICODE_NO_UPDATE_CHECK = "1"
          & "dist\${{ matrix.asset }}" --smoke
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error
          retention-days: 1

  release-assets:
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: dist
          merge-multiple: true
      - name: Create checksum manifest
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum practicode-* > SHA256SUMS
          test "$(wc -l < SHA256SUMS)" -eq 5
          sha256sum --check SHA256SUMS
      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          if is_draft=$(gh release view "$GITHUB_REF_NAME" --json isDraft --jq .isDraft 2>/dev/null); then
            test "$is_draft" = true || {
              echo "refusing to replace an already published release" >&2
              exit 1
            }
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --draft --verify-tag --generate-notes \
              --title "Practicode ${GITHUB_REF_NAME#v}"
          fi

  publish-crate:
    needs: release-assets
    runs-on: ubuntu-24.04
    environment: release
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: rustup toolchain install stable --profile minimal
      - run: rustup default stable
      - run: cargo publish --dry-run --locked
      - run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}

  publish-release:
    needs: publish-crate
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false --latest

  publish-npm:
    needs: publish-release
    runs-on: ubuntu-24.04
    environment: release
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm publish --dry-run --ignore-scripts
      - run: npm publish --ignore-scripts --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
